<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}NutriBot — IBM Watsonx.ai Nutrition Agent{% endblock %}</title>

  <!-- Bootstrap 5.3 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

  {% block extra_head %}{% endblock %}
</head>
<body>

<!-- ═══════════════════════════  NAVBAR  ═══════════════════════════ -->
<nav class="navbar navbar-expand-lg sticky-top" id="mainNav">
  <div class="container-fluid px-3 px-lg-4">

    <!-- Brand -->
    <a class="navbar-brand d-flex align-items-center gap-2" href="/">
      <div class="brand-icon">🥗</div>
      <span class="brand-text">NutriBot<span class="brand-sub"> AI</span></span>
    </a>

    <!-- Mobile controls -->
    <div class="d-flex align-items-center gap-2 d-lg-none">
      <button class="btn btn-icon" id="themeToggleMobile" title="Toggle dark mode">
        <i class="bi bi-moon-stars-fill"></i>
      </button>
      <button class="navbar-toggler border-0 p-1" type="button" data-bs-toggle="collapse"
              data-bs-target="#navbarContent" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
    </div>

    <!-- Nav links -->
    <div class="collapse navbar-collapse" id="navbarContent">
      <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-lg-center gap-lg-1">
        <li class="nav-item">
          <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">
            <i class="bi bi-chat-dots-fill me-1"></i>Chat
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.path == '/nutrition' %}active{% endif %}" href="/nutrition">
            <i class="bi bi-pie-chart-fill me-1"></i>Nutrition
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.path == '/meal-plan' %}active{% endif %}" href="/meal-plan">
            <i class="bi bi-calendar3-week-fill me-1"></i>Meal Plan
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.path == '/bmi' %}active{% endif %}" href="/bmi">
            <i class="bi bi-speedometer2 me-1"></i>BMI
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.path == '/family' %}active{% endif %}" href="/family">
            <i class="bi bi-people-fill me-1"></i>Family
          </a>
        </li>
        <li class="nav-item d-none d-lg-block ms-2">
          <button class="btn btn-icon" id="themeToggle" title="Toggle dark mode">
            <i class="bi bi-moon-stars-fill"></i>
          </button>
        </li>
      </ul>
    </div>

  </div>
</nav>

<!-- ═══════════════════════════  PAGE CONTENT  ═══════════════════════════ -->
<main class="main-content">
  {% block content %}{% endblock %}
</main>

<!-- ═══════════════════════════  FOOTER  ═══════════════════════════ -->
<footer class="site-footer">
  <div class="container text-center py-3">
    <small class="text-muted">
      Powered by <strong>IBM Watsonx.ai</strong> &amp; Granite Models &nbsp;|&nbsp;
      <i class="bi bi-heart-fill text-danger"></i> Built for healthy living
    </small>
  </div>
</footer>

<!-- ═══════════════════════════  PROFILE MODAL  ═══════════════════════════ -->
<div class="modal fade" id="profileModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header border-0">
        <h5 class="modal-title"><i class="bi bi-person-circle me-2 text-primary"></i>My Profile</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="profileForm">
          <div class="row g-3">
            <div class="col-6">
              <label class="form-label small fw-semibold">Name</label>
              <input type="text" class="form-control" name="name" placeholder="Your name">
            </div>
            <div class="col-3">
              <label class="form-label small fw-semibold">Age</label>
              <input type="number" class="form-control" name="age" placeholder="25" min="5" max="110">
            </div>
            <div class="col-3">
              <label class="form-label small fw-semibold">Gender</label>
              <select class="form-select" name="gender">
                <option value="">Select</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="other">Other</option>
              </select>
            </div>
            <div class="col-6">
              <label class="form-label small fw-semibold">Weight (kg)</label>
              <input type="number" class="form-control" name="weight" placeholder="65" step="0.5">
            </div>
            <div class="col-6">
              <label class="form-label small fw-semibold">Height (cm)</label>
              <input type="number" class="form-control" name="height" placeholder="170">
            </div>
            <div class="col-12">
              <label class="form-label small fw-semibold">Health Goal</label>
              <select class="form-select" name="goal">
                <option value="">Select goal</option>
                <option value="weight loss">Weight Loss</option>
                <option value="weight gain">Weight Gain</option>
                <option value="muscle building">Muscle Building</option>
                <option value="maintenance">Maintenance</option>
                <option value="manage diabetes">Manage Diabetes</option>
                <option value="heart health">Heart Health</option>
                <option value="general wellness">General Wellness</option>
              </select>
            </div>
            <div class="col-6">
              <label class="form-label small fw-semibold">Diet Type</label>
              <select class="form-select" name="diet_type">
                <option value="">Select</option>
                <option value="vegetarian">Vegetarian</option>
                <option value="vegan">Vegan</option>
                <option value="non-vegetarian">Non-Vegetarian</option>
                <option value="eggetarian">Eggetarian</option>
                <option value="Jain">Jain</option>
                <option value="keto">Keto</option>
                <option value="paleo">Paleo</option>
              </select>
            </div>
            <div class="col-6">
              <label class="form-label small fw-semibold">Activity Level</label>
              <select class="form-select" name="activity_level">
                <option value="">Select</option>
                <option value="sedentary">Sedentary</option>
                <option value="light">Light</option>
                <option value="moderate">Moderate</option>
                <option value="active">Active</option>
                <option value="very active">Very Active</option>
              </select>
            </div>
            <div class="col-12">
              <label class="form-label small fw-semibold">Health Conditions (optional)</label>
              <input type="text" class="form-control" name="health_conditions"
                     placeholder="e.g., diabetes, hypertension, PCOS">
            </div>
            <div class="col-12">
              <label class="form-label small fw-semibold">Food Allergies (optional)</label>
              <input type="text" class="form-control" name="allergies"
                     placeholder="e.g., nuts, dairy, gluten">
            </div>
            <div class="col-12">
              <label class="form-label small fw-semibold">Cuisine Preference</label>
              <select class="form-select" name="cuisine_preference">
                <option value="Indian">Indian</option>
                <option value="South Indian">South Indian</option>
                <option value="North Indian">North Indian</option>
                <option value="Continental">Continental</option>
                <option value="Mixed">Mixed</option>
              </select>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer border-0">
        <button class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-primary px-4" id="saveProfileBtn">
          <i class="bi bi-check-circle me-1"></i>Save Profile
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Toast Notification -->
<div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index:9999">
  <div id="notifToast" class="toast align-items-center border-0" role="alert">
    <div class="d-flex">
      <div class="toast-body" id="toastMsg">Saved!</div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- Marked.js for markdown rendering -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<!-- Custom JS -->
<script src="{{ url_for('static', filename='js/app.js') }}"></script>
{% block extra_scripts %}{% endblock %}
</body>
</html>
